<!DOCTYPE html>
<html>
<head>
    <title>All Users</title>
</head>
<body>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <ul>
            {% for message in messages %}
                <li style="color: green;">{{ message }}</li>
            {% endfor %}
            </ul>
        {% endif %}
    {% endwith %}

    <h1>Saved Users</h1>
    <ul>
        {% for user in users %}
        <li>{{ user.username }} — {{ user.skill }} <a href="/edit/{{ user.id }}">Edit</a> <a href="/delete/{{ user.id }}">Delete</a></li>
        {% endfor %}
    </ul>
</body>
</html>
