<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
</head>
<body>
    <h1>Edit Details</h1>
    <form method="POST" action="/update/{{ user.id }}">
        <label>Name:</label>
        <input type="text" name="username" value="{{ user.username }}">
        <br><br>
        <label>Skill:</label>
        <input type="text" name="skill" value="{{ user.skill }}">
        <br><br>
        <button type="submit">Update</button>
    </form>
</body>
</html>
